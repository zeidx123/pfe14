spring.application.name=back-end
jwt.secret=QWRtaW5TdXBlclNlY3JldEtleUZvckpXVDI1NkJpdHMxMjM0NTY=
jwt.expiration-ms=86400000

# Langchain4j OpenAI properties (for AssurGoAssistant / RAG)
langchain4j.open-ai.chat-model.api-key=${OPENAI_API_KEY:demo}
langchain4j.open-ai.chat-model.model-name=gpt-4o
langchain4j.open-ai.chat-model.timeout=PT60S
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true

# ─────────────────────────────────────────────────────────────────────────────
# NVIDIA AI Configuration (NvidiaAIService / ClaimOrchestrationService)
# Get your free key at: https://build.nvidia.com
# Set env variable: set NVIDIA_API_KEY=nvapi-xxxx
# ─────────────────────────────────────────────────────────────────────────────
nvidia.api-key=${NVIDIA_API_KEY:your-nvidia-api-key-here}
# Modèles plus rapides (675B / 90B vision dépassent souvent 90s de réponse)
nvidia.default-chat-model=LLAMA_3_3_70B
nvidia.default-vision-model=LLAMA_3_2_11B_VISION
nvidia.default-document-model=NEMOTRON_TABLE_STRUCTURE
nvidia.fast-fallback-chat-model=LLAMA_3_1_8B
# Un appel = une requête HTTP ; le pipeline enchaîne 2–3 appels → timeout généreux par étape
nvidia.timeout-seconds=240
nvidia.max-contract-chars=6000
nvidia.max-supporting-doc-chars=8000
nvidia.streaming-enabled=false

# WebClient / file upload limits for large image payloads
spring.codec.max-in-memory-size=20MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ─────────────────────────────────────────────────────────────────────────────
# Swagger UI / OpenAPI  (Springdoc)
# Swagger UI  : http://localhost:8080/swagger-ui/index.html
# OpenAPI JSON: http://localhost:8080/v3/api-docs
# Import into Postman: File > Import > Link > http://localhost:8080/v3/api-docs
# ─────────────────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.try-it-out-enabled=true
